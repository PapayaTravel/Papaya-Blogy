<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Článok</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <a href="index.html" class="logo-link">
      <img src="image.png" class="logo" alt="Papaya logo">
      Papaya
    </a>
  </header>

  <div class="article-page-shell">
    <div class="article-wrapper">
      <div class="article">
        <h1 id="title"></h1>
        <div id="articleContent"></div>
        <a href="#" id="discordLink" class="discord-link" target="_blank" rel="noopener" style="display:none;">Diskusia na Discorde</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@sanity/client@6';
    import imageUrlBuilder from 'https://esm.sh/@sanity/image-url';
    import { toHTML } from 'https://esm.sh/@portabletext/to-html';

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
    import {
      getFirestore,
      doc,
      runTransaction,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

    const client = createClient({
      projectId: 'qmdaowg9',
      dataset: 'production',
      apiVersion: '2025-01-01',
      useCdn: true
    });

    const firebaseConfig = {
      apiKey: "AIzaSyDMX4SM_yMHrnBbDdieZA4nnuIc3Njx1qU",
      authDomain: "papaya-8f6fc.firebaseapp.com",
      projectId: "papaya-8f6fc",
      storageBucket: "papaya-8f6fc.firebasestorage.app",
      messagingSenderId: "878790020885",
      appId: "1:878790020885:web:0a9e5989f28ddf9a22231c",
      measurementId: "G-61J6C647F7"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getFirestore(firebaseApp);

    function getDeviceId() {
      let id = localStorage.getItem("papaya_device_id");
      if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem("papaya_device_id", id);
      }
      return id;
    }

    const builder = imageUrlBuilder(client);
    const urlFor = (source) => builder.image(source).auto('format').fit('max').width(1400).url();

    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');

    if (!slug) {
      document.getElementById('title').innerText = 'Článok sa nenašiel';
    } else {
      const post = await client.fetch(`
        *[_type == "post" && slug.current == $slug][0]{
          _id,
          title,
          body,
          discord
        }
      `, { slug });

      if (!post) {
        document.getElementById('title').innerText = 'Článok sa nenašiel';
      } else {
        document.getElementById('title').innerText = post.title;

        const html = toHTML(post.body || [], {
          components: {
            types: {
              image: ({value}) => {
                return `<img src="${urlFor(value)}" alt="" class="article-inline-image">`;
              }
            },
            block: {
              normal: ({children}) => `<p>${children}</p>`,
              h1: ({children}) => `<h1>${children}</h1>`,
              h2: ({children}) => `<h2>${children}</h2>`,
              h3: ({children}) => `<h3>${children}</h3>`,
              blockquote: ({children}) => `<blockquote>${children}</blockquote>`
            }
          }
        });

        document.getElementById('articleContent').innerHTML = html;

        const discordLink = document.getElementById('discordLink');
        if (post.discord) {
          discordLink.href = post.discord;
          discordLink.style.display = 'inline-flex';
        }

        const deviceId = getDeviceId();
        const counterRef = doc(db, "postViews", post._id);
        const viewerRef = doc(db, "postViews", post._id, "viewers", deviceId);

        await runTransaction(db, async (transaction) => {
          const viewerSnap = await transaction.get(viewerRef);

          if (!viewerSnap.exists()) {
            const counterSnap = await transaction.get(counterRef);
            const currentCount = counterSnap.exists() ? (counterSnap.data().count || 0) : 0;

            transaction.set(viewerRef, {
              createdAt: serverTimestamp()
            });

            transaction.set(counterRef, {
              count: currentCount + 1,
              title: post.title,
              slug: slug,
              updatedAt: serverTimestamp()
            }, { merge: true });
          }
        });
      }
    }
  </script>

</body>
</html>
