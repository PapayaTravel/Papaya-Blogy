<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Článok</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <a href="index.html" class="logo-link">
      <img src="image.png" class="logo" alt="Papaya logo">
      Papaya
    </a>
  </header>

  <div class="article-page-shell">
    <div class="article-wrapper">
      <div class="article">
        <h1 id="title"></h1>
        <div id="articleContent"></div>
        <a href="#" id="discordLink" class="discord-link" target="_blank" rel="noopener" style="display:none;">Diskusia na Discorde</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@sanity/client@6';
    import imageUrlBuilder from 'https://esm.sh/@sanity/image-url';
    import { toHTML } from 'https://esm.sh/@portabletext/to-html';

    const client = createClient({
      projectId: 'qmdaowg9',
      dataset: 'production',
      apiVersion: '2025-01-01',
      useCdn: true
    });

    const builder = imageUrlBuilder(client);
    const urlFor = (source) => builder.image(source).auto('format').fit('max').width(1400).url();

    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');

    if (!slug) {
      document.getElementById('title').innerText = 'Článok sa nenašiel';
    } else {
      const post = await client.fetch(`
        *[_type == "post" && slug.current == $slug][0]{
          _id,
          title,
          body,
          discord
        }
      `, { slug });

      if (!post) {
        document.getElementById('title').innerText = 'Článok sa nenašiel';
      } else {
        document.getElementById('title').innerText = post.title;

        const html = toHTML(post.body || [], {
          components: {
            types: {
              image: ({value}) => {
                return `<img src="${urlFor(value)}" alt="" class="article-inline-image">`;
              }
            },
            block: {
              normal: ({children}) => `<p>${children}</p>`,
              h1: ({children}) => `<h1>${children}</h1>`,
              h2: ({children}) => `<h2>${children}</h2>`,
              h3: ({children}) => `<h3>${children}</h3>`,
              blockquote: ({children}) => `<blockquote>${children}</blockquote>`
            }
          }
        });

        document.getElementById('articleContent').innerHTML = html;

        const discordLink = document.getElementById('discordLink');
        if (post.discord) {
          discordLink.href = post.discord;
          discordLink.style.display = 'inline-flex';
        }
      }
    }
  </script>

</body>
</html>
