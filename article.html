<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Článok</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a href="index.html" class="logo-link">
    <img src="image.png" class="logo">
    Papaya
  </a>
</header>

<div class="article-wrapper">
  <div class="article">
    <h1 id="title"></h1>
    <div id="articleContent"></div>
    <a href="#" id="discordLink" class="discord-link" target="_blank" rel="noopener" style="display:none;">Diskusia na Discorde</a>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@sanity/client@6';
import { toHTML } from 'https://esm.sh/@portabletext/to-html';

const client = createClient({
  projectId: 'qmdaowg9',
  dataset: 'production',
  apiVersion: '2025-01-01',
  useCdn: true
});

const params = new URLSearchParams(window.location.search);
const slug = params.get('slug');

if (!slug) {
  document.getElementById('title').innerText = 'Článok sa nenašiel';
} else {
  const post = await client.fetch(`
    *[_type == "post" && slug.current == $slug][0]{
      _id,
      title,
      body
    }
  `, { slug });

  if (!post) {
    document.getElementById('title').innerText = 'Článok sa nenašiel';
  } else {
    document.getElementById('title').innerText = post.title;
    document.getElementById('articleContent').innerHTML = toHTML(post.body || []);

    const viewedKey = `viewed_${post._id}`;
    const viewsKey = `views_${post._id}`;

    if (!localStorage.getItem(viewedKey)) {
      const current = parseInt(localStorage.getItem(viewsKey) || '0', 10);
      localStorage.setItem(viewsKey, String(current + 1));
      localStorage.setItem(viewedKey, 'true');
    }
  }
}
</script>

</body>
</html>
