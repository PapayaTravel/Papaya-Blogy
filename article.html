<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Článok</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a href="index.html" class="logo-link">
    <img src="image.png" class="logo">
    Papaya
  </a>
</header>

<div class="article-wrapper">
  <div class="article">
    <h1 id="title"></h1>
    <p>Obsah článku...</p>
    <a href="https://discord.com" class="discord-link">Diskusia na Discorde</a>
  </div>
</div>

<script>
let title = localStorage.getItem("articleTitle");
document.getElementById("title").innerText = title;

// VIEW SYSTEM
let key = "viewed_" + title;

if(!localStorage.getItem(key)) {

  let viewsKey = "views_" + title;

  let current = localStorage.getItem(viewsKey);
  current = current ? parseInt(current) : 0;

  current++;

  localStorage.setItem(viewsKey, current);

  // označí že zariadenie už videlo tento článok
  localStorage.setItem(key, true);
}
</script>

</body>
</html>
