<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Papaya Blogy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Montserrat:wght@700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <a href="index.html" class="logo-link">
    <img src="image.png" class="logo">
    Papaya
  </a>
</header>

<!-- SLIDER -->
<div class="slider">
  <div class="slider-track" id="sliderTrack"></div>
</div>

<section class="intro">

  <h1>Papaya Blogy</h1>

  <p class="center-text">
    Blogy a príspevky z nášho Discord servera.
  </p>

  <a href="https://discord.gg/pJyMf2Jxba" class="discord-btn">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
    Discord Papaya
  </a>

</section>

<h2 class="fancy">Oficiálne blogy servera Papaya</h2>

<div class="categories">
  <a href="category.html" class="cat-btn">Top destinácie</a>
  <a href="category.html" class="cat-btn">Tipy a triky</a>
  <a href="category.html" class="cat-btn">Problémy a nástrahy</a>
  <a href="category.html" class="cat-btn">Zaujímavosti</a>
  <a href="category.html" class="cat-btn">Informácie</a>
</div>

<h2 class="fancy">Komunitné príspevky</h2>

<div class="categories">
  <a href="category.html" class="cat-btn">Denníky</a>

  <p class="under-text">
    Denníky sú osobné skúsenosti členov komunity.
  </p>
</div>

<script>
// články (musia byť rovnaké ako v category!)
let articles = [
  {title: "Prvý článok", img: "https://via.placeholder.com/600x400"},
  {title: "Druhý článok", img: "https://via.placeholder.com/600x400"},
  {title: "Tretí článok", img: "https://via.placeholder.com/600x400"}
];

// načítanie views
articles = articles.map(a => {
  let v = localStorage.getItem("views_" + a.title);
  return {...a, views: v ? parseInt(v) : 0};
});

// TOP 10
let top = articles.sort((a,b) => b.views - a.views).slice(0,10);

let track = document.getElementById("sliderTrack");
// duplikácia aby bol slider plynulý
let fullList = [...top, ...top];
// render
fullList.forEach(a => {
  let div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <div class="img-wrap">
      <img src="${a.img}">
    </div>
    <div class="card-title">${a.title}</div>
  `;

  div.onclick = () => {
    localStorage.setItem("articleTitle", a.title);
    window.location.href = "article.html";
  };

  track.appendChild(div);
});
</script>

</body>
</html>
