<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Kategória</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
  <a href="index.html" class="logo-link">
    <img src="image.png" class="logo">
    Papaya
  </a>
</header>

<div class="top-bar">

  <div>
    <button onclick="toggleSort()" class="filter-btn">Zoradiť podľa</button>

    <div id="sortMenu" class="dropdown">
      <div onclick="sortArticles('new')">Najnovšie</div>
      <div onclick="sortArticles('old')">Najstaršie</div>
      <div onclick="sortArticles('top')">Top články</div>
    </div>
  </div>

  <input type="text" id="search" placeholder="Hľadať článok...">

</div>

<div class="tags">
  Tagy:
  <span class="tag">Tag 1</span>
  <span class="tag">Tag 2</span>
  <span class="tag">Tag 3</span>
</div>

<section class="gallery" id="gallery">

  <div class="card" data-title="Prvý článok" onclick="openArticle(this)">
    <img src="https://via.placeholder.com/300">
    <div class="title">Prvý článok</div>
  </div>

  <div class="card" data-title="Druhý článok" onclick="openArticle(this)">
    <img src="https://via.placeholder.com/300">
    <div class="title">Druhý článok</div>
  </div>

</section>

<script>
function toggleSort() {
  document.getElementById("sortMenu").classList.toggle("show");
}

// SEARCH
document.getElementById("search").addEventListener("keyup", function() {
  let value = this.value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let title = card.getAttribute("data-title").toLowerCase();
    card.style.display = title.includes(value) ? "block" : "none";
  });
});

function openArticle(card) {
  localStorage.setItem("articleTitle", card.getAttribute("data-title"));
  window.location.href = "article.html";
}
</script>

</body>
</html>
