<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kategória</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@600;800&family=Playfair+Display:wght@600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <a href="index.html" class="logo-link">
      <img src="image.png" class="logo" alt="Papaya logo">
      Papaya
    </a>
  </header>

  <div class="top-bar">
    <button id="filterBtn" class="filter-btn" type="button">Filtrovať ▶</button>

    <div id="filterContent" class="filter-content">
      <button id="sortBtn" class="sort-btn" type="button">Zoradiť podľa ▼</button>

      <div id="sortOptions" class="sort-options">
        <div data-sort="new">Najnovšie</div>
        <div data-sort="old">Najstaršie</div>
        <div data-sort="top">Top články</div>
      </div>

      <span class="tags-label">Tagy:</span>
      <div id="tagList" class="tag-list"></div>
    </div>

    <input type="text" id="search" placeholder="Hľadať článok...">
  </div>

  <section class="gallery" id="gallery"></section>

  <script type="module">
    import { createClient } from 'https://esm.sh/@sanity/client@6';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

    const client = createClient({
      projectId: 'qmdaowg9',
      dataset: 'production',
      apiVersion: '2025-01-01',
      useCdn: true
    });

    const firebaseConfig = {
      apiKey: "AIzaSyDMX4SM_yMHrnBbDdieZA4nnuIc3Njx1qU",
      authDomain: "papaya-8f6fc.firebaseapp.com",
      projectId: "papaya-8f6fc",
      storageBucket: "papaya-8f6fc.firebasestorage.app",
      messagingSenderId: "878790020885",
      appId: "1:878790020885:web:0a9e5989f28ddf9a22231c",
      measurementId: "G-61J6C647F7"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getFirestore(firebaseApp);

    const params = new URLSearchParams(window.location.search);
    const cat = params.get('cat') || 'top';

    const categoryMap = {
      top: 'Top Destinácie',
      tipy: 'Tipy a Triky',
      problemy: 'Problémy a Nástrahy',
      zaujimavosti: 'Zaujímavosti',
      info: 'Informácie',
      dennik: 'Denníky'
    };

    const categoryTitle = categoryMap[cat] || 'Top Destinácie';

    const gallery = document.getElementById('gallery');
    const searchInput = document.getElementById('search');
    const tagList = document.getElementById('tagList');
    const filterBtn = document.getElementById('filterBtn');
    const filterContent = document.getElementById('filterContent');
    const sortBtn = document.getElementById('sortBtn');
    const sortOptions = document.getElementById('sortOptions');

    let allPosts = [];
    let activeTags = [];
    let currentSort = 'new';

    filterBtn.addEventListener('click', () => {
      const isOpen = filterContent.classList.toggle('show-flex');
      filterBtn.textContent = isOpen ? 'Filtrovať ▼' : 'Filtrovať ▶';
      if (!isOpen) sortOptions.classList.remove('show-block');
    });

    sortBtn.addEventListener('click', () => {
      sortOptions.classList.toggle('show-block');
    });

    sortOptions.querySelectorAll('div').forEach(option => {
      option.addEventListener('click', () => {
        currentSort = option.dataset.sort;

        const labels = {
          new: 'Najnovšie',
          old: 'Najstaršie',
          top: 'Top články'
        };

        sortBtn.textContent = `${labels[currentSort]} ▼`;
        sortOptions.classList.remove('show-block');
        renderPosts();
      });
    });

    function buildTags(posts) {
      const uniqueTags = [...new Set(posts.flatMap(post => post.tags || []))];
      tagList.innerHTML = '';

      uniqueTags.forEach(tag => {
        const el = document.createElement('span');
        el.className = 'tag';
        el.dataset.tag = tag;
        el.innerText = tag;

        el.addEventListener('click', () => {
          if (activeTags.includes(tag)) {
            activeTags = activeTags.filter(t => t !== tag);
            el.classList.remove('active-tag');
          } else {
            activeTags.push(tag);
            el.classList.add('active-tag');
          }
          renderPosts();
        });

        tagList.appendChild(el);
      });
    }

    function renderPosts() {
      const search = searchInput.value.trim().toLowerCase();
      gallery.innerHTML = '';

      let posts = [...allPosts];

      if (activeTags.length > 0) {
        posts = posts.filter(post => {
          const tags = post.tags || [];
          return activeTags.some(tag => tags.includes(tag));
        });
      }

      if (search) {
        posts = posts.filter(post => post.title.toLowerCase().includes(search));
      }

      if (currentSort === 'new') {
        posts.sort((a, b) => new Date(b.publishedAt || b._createdAt) - new Date(a.publishedAt || a._createdAt));
      } else if (currentSort === 'old') {
        posts.sort((a, b) => new Date(a.publishedAt || a._createdAt) - new Date(b.publishedAt || b._createdAt));
      } else if (currentSort === 'top') {
        posts.sort((a, b) => b.views - a.views);
      }

      if (posts.length === 0) {
        gallery.innerHTML = `<div class="empty-state">Žiadne články pre toto filtrovanie.</div>`;
        return;
      }

      posts.forEach(post => {
        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
          <div class="img-wrap">
            <img src="${post.image || 'https://via.placeholder.com/600x400'}" alt="${post.title}" loading="lazy">
          </div>
          <div class="card-title">${post.title}</div>
        `;

        card.addEventListener('click', () => {
          window.location.href = `article.html?slug=${encodeURIComponent(post.slug)}`;
        });

        gallery.appendChild(card);
      });
    }

    searchInput.addEventListener('input', renderPosts);

    allPosts = await client.fetch(`
      *[_type == "post" && $categoryTitle in categories[]->title] | order(publishedAt desc) {
        _id,
        _createdAt,
        publishedAt,
        title,
        "slug": slug.current,
        "image": mainImage.asset->url,
        tags
      }
    `, { categoryTitle });

    allPosts = await Promise.all(allPosts.map(async post => {
      const snap = await getDoc(doc(db, "postViews", post._id));
      const views = snap.exists() ? (snap.data().count || 0) : 0;
      return { ...post, views };
    }));

    buildTags(allPosts);
    renderPosts();
  </script>

</body>
</html>
