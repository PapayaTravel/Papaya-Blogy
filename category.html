<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Kategória</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>Papaya</header>

<div class="top-bar">
  <button onclick="toggleFilter()" class="filter-btn">Filter</button>
  <input type="text" id="search" placeholder="Hľadať článok...">
</div>

<div id="filters" class="filters">
  <button>Najnovšie</button>
  <button>Najstaršie</button>
  <button>Top</button>
</div>

<section class="gallery" id="gallery">

  <div class="card" data-title="Prvý článok" onclick="openArticle(this)">
    <img src="https://via.placeholder.com/300">
    <div class="title">Prvý článok</div>
  </div>

  <div class="card" data-title="Druhý článok" onclick="openArticle(this)">
    <img src="https://via.placeholder.com/300">
    <div class="title">Druhý článok</div>
  </div>

</section>

<script>
function toggleFilter() {
  document.getElementById("filters").classList.toggle("show");
}

// 🔍 FUNKČNÉ VYHĽADÁVANIE
document.getElementById("search").addEventListener("keyup", function() {
  let value = this.value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let title = card.getAttribute("data-title").toLowerCase();

    if (title.includes(value)) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
});

function openArticle(card) {
  let title = card.getAttribute("data-title");
  localStorage.setItem("articleTitle", title);
  window.location.href = "article.html";
}
</script>

</body>
</html>
